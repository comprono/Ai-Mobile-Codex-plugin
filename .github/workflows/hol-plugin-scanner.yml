name: HOL Plugin Scanner

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

jobs:
  lifecycle:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Portable MCP smoke test
        run: node scripts/reliability-e2e.js

      - name: Finite orchestration regression
        run: node scripts/orchestration-regression.js

      - name: Delegation economics regression
        run: node scripts/economic-regression.js

      - name: AI Mobile lifecycle tests
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ".\scripts\antigravity.ps1" self-test

  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@dc487e7197ee2a42aa56e96eba4960f8a903c88d # v1
        with:
          plugin_dir: "."
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          upload_sarif: true
