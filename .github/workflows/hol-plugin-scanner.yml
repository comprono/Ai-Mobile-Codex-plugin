name: HOL Plugin Scanner

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

jobs:
  lifecycle:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Director-CFO context intake
        run: node scripts/director-cfo-context-regression.js

      - name: Director-CFO durable contracts
        run: node scripts/director-cfo-contracts-regression.js

      - name: Director-CFO resource budget
        run: node scripts/director-cfo-budget-regression.js

      - name: Director-CFO runtime state
        run: node scripts/director-cfo-runtime-regression.js

      - name: Truthful material program reporting
        run: node scripts/program-reporting-regression.js

      - name: Director-CFO typed execution
        run: node scripts/director-cfo-typed-execution-regression.js

      - name: Director-CFO end-to-end program
        run: node scripts/director-cfo-program-regression.js

      - name: Director-CFO in-place legacy migration
        run: node scripts/director-cfo-migration-regression.js

      - name: Portable MCP smoke test
        run: node scripts/reliability-e2e.js

      - name: Same-turn continuation regression
        run: node scripts/continuation-regression.js

      - name: Bounded task-cycle regression
        run: node scripts/task-cycle-regression.js

      - name: Console and work-plane contract
        run: node scripts/console-workplane-regression.js

      - name: Durable event-driven coordinator
        run: node scripts/durable-event-regression.js

      - name: Durable Director-CFO campaign continuation
        run: node scripts/director-cfo-campaign-continuation-regression.js

      - name: Provider capability and quota routing
        run: node scripts/provider-capability-regression.js

      - name: Path-bounded provider patch transport
        run: node scripts/provider-patch-regression.js

      - name: App-server restart ordering
        run: node scripts/app-server-resume-regression.js

      - name: Deterministic integration regression
        run: node scripts/integration-regression.js

      - name: Fable routing regression
        run: node scripts/fable-routing-regression.js

      - name: Trusted primary writer and restart handoff
        run: node scripts/trusted-primary-regression.js

      - name: Shared Codex and Claude installation
        run: node scripts/shared-host-install-regression.js

      - name: Exact installed runtime parity
        run: node scripts/installed-runtime-parity-regression.js

      - name: Outcome recovery and reconciliation
        run: node scripts/outcome-recovery-e2e.js

      - name: Finite orchestration regression
        run: node scripts/orchestration-regression.js

      - name: Central state and capacity regression
        run: node scripts/state-capacity-regression.js

      - name: Isolated writer regression
        run: node scripts/worker-isolation-regression.js

      - name: Multi-project portfolio end-to-end
        run: node scripts/portfolio-e2e.js

      - name: Machine-wide resource guards
        run: node scripts/global-resource-regression.js

      - name: SQLite observation receipt boundary
        run: node scripts/sqlite-observation-regression.js

      - name: Worktree storage lifecycle
        run: node scripts/storage-lifecycle-regression.js

      - name: Delegation economics regression
        run: node scripts/economic-regression.js

      - name: AI Mobile lifecycle tests
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ".\scripts\antigravity.ps1" self-test

  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@dc487e7197ee2a42aa56e96eba4960f8a903c88d # v1
        with:
          plugin_dir: "."
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          upload_sarif: true
